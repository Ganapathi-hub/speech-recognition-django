<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Design by foolishdeveloper.com -->
    <title>Login</title>
 
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <!--Stylesheet-->
    <style media="screen">
        *,
        *:before,
        *:after {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('static/ai2.jpg');
        }

        .background {
            background-image: url('C:\\Users\\Ganap\\OneDrive\\Pictures');
            width: 430px;
            height: 520px;
            position: absolute;
            transform: translate(-50%, -50%);
            left: 50%;
            top: 50%;
        }

        form {
            height: 520px;
            width: 400px;
            background-color: rgba(255, 255, 255, 0.13);
            position: absolute;
            transform: translate(-50%, -50%);
            top: 50%;
            left: 50%;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(8, 7, 16, 0.6);
            padding: 50px 35px;
        }

        form * {
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
            letter-spacing: 0.5px;
            outline: none;
            border: none;
        }

        form h3 {
            font-size: 32px;
            font-weight: 500;
            line-height: 42px;
            text-align: center;
        }

        label {
            display: block;
            margin-top: 30px;
            font-size: 16px;
            font-weight: 500;
        }

        input {
            display: block;
            height: 50px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.07);
            border-radius: 3px;
            padding: 0 10px;
            margin-top: 8px;
            font-size: 14px;
            font-weight: 300;
        }

        ::placeholder {
            color: #e5e5e5;
        }

        button {
            margin-top: 30px;
            width: 100%;
            background-color: #ffffff;
            color: #080710;
            padding: 15px 0;
            font-size: 18px;
            font-weight: 600;
            border-radius: 5px;
            cursor: pointer;
        }

        .other {
            margin-top: 20px;
            text-align: center;
        }

        .btn {
            width: 45%;
            padding: 12px 0;
            font-size: 16px;
        }

        .submits {
            background: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
            margin-right: 10px;
        }

        .sign-up {
            background: #ffffff;
            color: #080710;
            text-decoration: none; /* Remove default underline */
        }
        
        
        .forgot-password {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            margin-right: 10px;
        }
        
        .forgot-password:hover {
            text-decoration: underline;
        }

        button:hover{
            transform:translatey(3px);
            box-shadow: none;
        }

        button:hover{
            animation:ani9 0.4s ease-in-out infinite alternate;
        }
        @keyframes ani9{
            0%{
                transform:translateY(3px);
            }
            100%
            {
                transform:translateY(5px);
            }
        }
        .alert{
            color:red;
            text-align:center;
            background-color:white;
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
    
    {% for m in messages %}
    <div class="alert alert-danger" role="alert" >
        {{m}}
    </div>
    {% endfor %}
    <form action="/login" method="post">
        {%csrf_token%}

        <h3>Login Here</h3>

        <label for="username">Username</label>
        <input type="text" name="username" placeholder="Username" id="username" required>

        <label for="password">Password</label>
        <input type="password" name="password"placeholder="Password" id="password"required>

        <button type="submit" class="login__button">Login</button>

        <div class="other">
            <a href="/forgot_password" class="forgot-password">Forgot Password ?</a>
            <button class="btn sign-up" id="signup-btn">Sign Up</button>
        </div>
        <input type="button" value="Back"  onclick="window.open(&quot;http://127.0.0.1:8000/&quot;);" />
    </form>
    
    <script>
        // Dynamically set the href attribute of the "Sign Up" button
        document.getElementById("signup-btn").addEventListener("click", function() {
            window.location.href = "/emailverify";
        });
    </script>
</body>
</html>
